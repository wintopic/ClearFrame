<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">ClearFrame repository preview</title>
  <desc id="desc">A polished preview card showing GNOME transparency controls for Dock, top bar, and windows.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ecfff6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7b45"/>
      <stop offset="1" stop-color="#d84711"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#74e99a"/>
      <stop offset="1" stop-color="#18b96f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#1b2430" flood-opacity=".16"/>
    </filter>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r="1.6" fill="#2ec27e" opacity=".22"/>
    </pattern>
    <radialGradient id="dotFade" cx="1" cy="0" r=".95">
      <stop offset="0" stop-color="#fff"/>
      <stop offset=".62" stop-color="#fff"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="dotsMask">
      <rect x="0" y="0" width="1200" height="640" fill="url(#dotFade)"/>
    </mask>
  </defs>

  <rect width="1200" height="640" rx="42" fill="url(#page)"/>
  <rect x="610" y="34" width="530" height="260" fill="url(#dots)" mask="url(#dotsMask)" opacity=".9"/>

  <g transform="translate(76 84)">
    <rect x="0" y="0" width="1048" height="472" rx="32" fill="#ffffff" filter="url(#softShadow)"/>
    <rect x="0" y="0" width="1048" height="472" rx="32" fill="none" stroke="#e8edf3"/>

    <g transform="translate(58 54)">
      <rect x="0" y="0" width="64" height="64" rx="18" fill="url(#green)"/>
      <path d="m19 33 10 10 18-22" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="29" fill="#20242c" font-family="Inter, Cantarell, Arial, sans-serif" font-size="34" font-weight="800">透界 ClearFrame</text>
      <text x="92" y="62" fill="#687383" font-family="Inter, Cantarell, Arial, sans-serif" font-size="20">GNOME transparency control, tidy and immediate.</text>
    </g>

    <g transform="translate(58 156)">
