        <rect x="24" y="22" width="34" height="34" rx="10" fill="#e3efff"/>
        <path d="M34 33h16v16H34zM42 33v16M34 41h16" fill="none" stroke="#3584e4" stroke-width="3" stroke-linecap="round"/>
        <text x="78" y="48" fill="#2b3038" font-family="Inter, Cantarell, Arial, sans-serif" font-size="22" font-weight="750">Windows</text>
        <line x1="192" y1="39" x2="738" y2="39" stroke="#d5dae1" stroke-width="8" stroke-linecap="round"/>
        <line x1="192" y1="39" x2="330" y2="39" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
        <circle cx="344" cy="39" r="13" fill="#ffffff" stroke="#cfd6df"/>
        <rect x="824" y="24" width="58" height="30" rx="15" fill="#d5dae1"/>
        <circle cx="840" cy="39" r="12" fill="#f4f6f8"/>
      </g>
    </g>

    <g transform="translate(58 414)">
      <rect width="932" height="1" fill="#edf0f4"/>
      <text x="0" y="38" fill="#687383" font-family="Inter, Cantarell, Arial, sans-serif" font-size="18">GTK/libadwaita app · bundled GNOME Shell extension · GitHub Release updates</text>
    </g>
