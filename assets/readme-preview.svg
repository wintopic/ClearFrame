        <line x1="192" y1="39" x2="738" y2="39" stroke="#d5dae1" stroke-width="8" stroke-linecap="round"/>
        <line x1="192" y1="39" x2="704" y2="39" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
        <circle cx="720" cy="39" r="13" fill="#ffffff" stroke="#cfd6df"/>
        <rect x="824" y="24" width="58" height="30" rx="15" fill="url(#accent)"/>
        <circle cx="867" cy="39" r="12" fill="#f4f6f8"/>
      </g>

      <g transform="translate(0 208)">
